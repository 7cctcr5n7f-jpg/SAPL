name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          vercel deploy --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=team_KPJQJCwQ4XDOrazDie0EHCt9
